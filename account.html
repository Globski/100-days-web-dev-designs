<!DOCTYPE html>
<!-- Declares the document type and tells the browser this is an HTML5 document -->

<html lang="en">
<!-- Root element of the webpage. lang="en" tells browsers the page language is English -->

<head>
<!-- The head section contains metadata, styles, and settings for the page -->

<meta charset="UTF-8">
<!-- Defines the character encoding so all text displays correctly -->

<title>My Account</title>
<!-- Title that appears in the browser tab -->

<style>
/* CSS styling section for the webpage */

/* BODY STYLE */

body{
font-family:Segoe UI;
/* Sets the default font for the page */

background:#0f172a;
/* Sets a dark blue background color */

color:white;
/* Makes all text white by default */

padding:40px;
/* Adds space between the page content and the browser edges */
}

/* CONTAINER */

.container{
max-width:1000px;
/* Limits the width of the content to 1000 pixels */

margin:auto;
/* Centers the container horizontally */
}

/* HEADER SECTION */

.header{
display:flex;
/* Enables Flexbox layout */

justify-content:space-between;
/* Pushes items apart (profile left, logout button right) */

align-items:center;
/* Vertically centers items */

margin-bottom:30px;
/* Adds space below the header */
}

/* PROFILE SECTION */

.profile{
display:flex;
/* Makes the profile elements align horizontally */

align-items:center;
/* Vertically centers the profile elements */

gap:15px;
/* Adds 15px space between the image and text */
}

/* PROFILE IMAGE */

.profile img{
width:60px;
/* Sets the width of the profile picture */

height:60px;
/* Sets the height */

border-radius:50%;
/* Makes the image a circle */

border:2px solid #4CAF50;
/* Adds a green border around the picture */
}

/* LOGOUT BUTTON */

.logout{
background:#ef4444;
/* Red background color */

border:none;
/* Removes default browser border */

padding:10px 16px;
/* Adds space inside the button */

border-radius:6px;
/* Rounds the corners */

color:white;
/* Button text color */

cursor:pointer;
/* Changes mouse pointer to hand when hovering */
}

/* CARD COMPONENT */

.card{
border:1px solid rgba(255,255,255,0.15);
/* Light transparent border around card */

border-radius:12px;
/* Rounded corners */

padding:25px;
/* Space inside the card */

margin-bottom:20px;
/* Space between cards */

background:#111827;
/* Dark background color for card */
}

/* SUBSCRIPTION PLAN CONTAINER */

.plans{
display:flex;
/* Uses Flexbox layout */

gap:20px;
/* Adds space between subscription cards */

margin-top:20px;
/* Adds space above plans */

flex-wrap:wrap;
/* Allows cards to move to next row on smaller screens */
}

/* SINGLE SUBSCRIPTION PLAN */

.plan{
flex:1;
/* Allows the plan to expand equally */

min-width:200px;
/* Minimum width before wrapping */

border:1px solid rgba(255,255,255,0.15);
/* Border around plan card */

padding:20px;
/* Space inside plan card */

border-radius:10px;
/* Rounded edges */

background:#0b1220;
/* Dark background */

text-align:center;
/* Centers the text */
}

/* PLAN TITLE */

.plan h3{
margin-bottom:10px;
/* Adds space below the plan name */
}

/* PRICE STYLE */

.price{
font-size:22px;
/* Makes price text larger */

color:#4CAF50;
/* Green color for price */

margin-bottom:10px;
/* Space below the price */
}

/* PLAN BUTTON */

.plan button{
background:#4CAF50;
/* Green background */

border:none;
/* Removes border */

padding:8px 16px;
/* Adds space inside button */

border-radius:6px;
/* Rounded button edges */

color:white;
/* Button text color */

cursor:pointer;
/* Hand cursor on hover */
}

</style>
</head>

<body>
<!-- Visible webpage content starts here -->

<div class="container">
<!-- Main container that holds all content -->

<!-- HEADER -->

<div class="header">
<!-- Header containing profile info and logout button -->

<div class="profile">
<!-- Profile section -->

<img src="https://randomuser.me/api/portraits/men/32.jpg">
<!-- Random user profile picture -->

<div>
<!-- Container for name and email -->

<h2>John Doe</h2>
<!-- User name -->

<p>user@email.com</p>
<!-- User email address -->

</div>
</div>

<button class="logout" onclick="logout()">Logout</button>
<!-- Logout button that triggers the logout() JavaScript function -->

</div>

<!-- ACCOUNT INFO -->

<div class="card">
<!-- Card component for account information -->

<h3>Account Info</h3>
<!-- Card heading -->

<p>Status: Active</p>
<!-- Shows the account status -->

<p>Member since: 2026</p>
<!-- Shows the year the user joined -->
</div>

<!-- SUBSCRIPTION SECTION -->

<div class="card">
<!-- Card containing subscription plans -->

<h3>Subscription Plans</h3>
<!-- Title of subscription section -->

<div class="plans">
<!-- Container holding all plan cards -->

<div class="plan">
<!-- Basic plan card -->

<h3>Basic</h3>
<!-- Plan name -->

<div class="price">$4</div>
<!-- Plan price -->

<p>Monthly</p>
<!-- Billing cycle -->

<button>Select</button>
<!-- Button to choose this plan -->
</div>

<div class="plan">
<!-- Pro plan -->

<h3>Pro</h3>

<div class="price">$7</div>

<p>4 Months</p>

<button>Select</button>
</div>

<div class="plan">
<!-- Premium plan -->

<h3>Premium</h3>

<div class="price">$15</div>

<p>Yearly</p>

<button>Select</button>
</div>

</div>

</div>

<!-- SERVICES SECTION -->

<div class="card">
<!-- Card for services section -->

<h3>Services</h3>
<!-- Section heading -->

<p>You can edit this section later.</p>
<!-- Placeholder text -->
</div>

</div>

<script>
/* JavaScript section */

/* Logout function */

function logout(){
/* Function runs when logout button is clicked */

alert("Logged out successfully");
/* Displays a popup message */

window.location.href="index.html";
/* Redirects the user to the login page */
}

</script>

</body>
</html>
