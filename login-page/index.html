<!DOCTYPE html>
<!-- Declares the document type so the browser knows this is an HTML5 page -->

<html lang="en">
<!-- Root element of the webpage. "lang=en" tells browsers and search engines the language is English -->

<head>
<!-- The head contains metadata and settings for the page -->

<meta charset="UTF-8">
<!-- Sets the character encoding so text displays correctly -->

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Makes the page responsive on mobile devices -->

<title>Login</title>
<!-- The title that appears on the browser tab -->

<style>
/* CSS section where we style the webpage */

/* Universal selector affecting every element */
*{
margin:0;
/* Removes default margin from all elements */

padding:0;
/* Removes default padding */

box-sizing:border-box;
/* Makes width and height include padding and borders */

font-family:Segoe UI;
/* Sets the default font used on the site */
}

/* Body styles */
body{
height:100vh;
/* Makes the body take the full screen height */

display:flex;
/* Enables flexbox layout */

justify-content:flex-end;
/* Pushes the login box to the right side */

align-items:center;
/* Vertically centers the login box */

background:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center/cover;
/* Adds a full-screen background image */
}

/* LOGIN CONTAINER */

.login-box{
width:400px;
/* Width of the login panel */

height:100%;
/* Makes it full height */

background:rgba(255,255,255,0.08);
/* Semi-transparent background */

backdrop-filter:blur(14px);
/* Creates a glass blur effect (modern glassmorphism style) */

padding:60px 40px;
/* Space inside the login box */

border-left:1px solid rgba(255,255,255,0.2);
/* Light border separating it from background */

display:flex;
/* Enables flexbox inside the container */

flex-direction:column;
/* Stacks elements vertically */

justify-content:center;
/* Vertically centers the login form */
}

/* Login title styling */
h2{
color:white;
/* Makes text white */

margin-bottom:30px;
/* Adds space below the heading */

font-size:28px;
/* Sets font size */
}

/* Input field styling */
input{
width:100%;
/* Inputs stretch across the container */

padding:14px;
/* Space inside input */

margin-bottom:20px;
/* Space between inputs */

border-radius:8px;
/* Rounded corners */

border:none;
/* Removes default border */

outline:none;
/* Removes blue outline when clicked */

font-size:16px;
/* Text size inside inputs */
}

/* Login button styling */
button{
padding:14px;
/* Space inside the button */

background:#4CAF50;
/* Green button color */

border:none;
/* Removes default border */

border-radius:8px;
/* Rounded edges */

color:white;
/* Button text color */

font-size:16px;
/* Button text size */

cursor:pointer;
/* Changes mouse pointer to hand */

transition:.3s;
/* Smooth animation for hover effect */
}

/* Button hover effect */
button:hover{
background:#43a047;
/* Darker green when mouse hovers */
}

/* SUCCESS SCREEN */

.success{
position:fixed;
/* Fixes the success screen on top of everything */

top:0;
left:0;
/* Positions it at top-left corner */

width:100%;
height:100%;
/* Makes it cover the entire screen */

background:#111;
/* Dark background */

display:none;
/* Hidden by default */

align-items:center;
justify-content:center;
/* Centers items horizontally and vertically */

flex-direction:column;
/* Stacks success elements vertically */

color:white;
/* Text color */
}

/* Green checkmark style */
.check{
font-size:80px;
/* Large checkmark icon */

color:#4CAF50;
/* Green color */
}

/* Loading spinner */
.loader{
margin-top:20px;
/* Space above loader */

border:6px solid #333;
/* Gray outer circle */

border-top:6px solid #4CAF50;
/* Green spinning section */

border-radius:50%;
/* Makes circle shape */

width:60px;
height:60px;
/* Size of spinner */

animation:spin 1s linear infinite;
/* Animation that rotates continuously */
}

/* Animation keyframes */
@keyframes spin{
0%{transform:rotate(0)}
/* Start rotation */

100%{transform:rotate(360deg)}
/* Full rotation */
}

</style>
</head>

<body>

<!-- Login form container -->
<div class="login-box">

<h2>Login</h2>
<!-- Login heading -->

<input type="text" placeholder="Email">
<!-- Text field for email -->

<input type="password" placeholder="Password">
<!-- Password field hides typed characters -->

<button onclick="login()">Login</button>
<!-- Button that triggers the login() JavaScript function -->

</div>


<!-- Success screen that appears after login -->
<div class="success" id="success">

<div class="check">✔</div>
<!-- Green checkmark icon -->

<h2>Login Successful</h2>
<!-- Success message -->

<div class="loader"></div>
<!-- Rotating loading spinner -->

</div>

<script>

/* JavaScript function triggered when Login button is clicked */
function login(){

document.getElementById("success").style.display="flex";
/* Shows the success screen */

setTimeout(()=>{
/* Waits for a specified time */

window.location.href="account.html";
/* Redirects the user to the account page */

},2500);
/* Wait time = 2.5 seconds */

}

</script>

</body>
</html>
