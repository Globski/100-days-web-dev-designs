<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIANNA</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="nav">
<i class="fas fa-bars"></i>
<span>BRIANNA</span>
</div>

<div class="carousel">
<img src="images/slide1.png" class="slide active">
<img src="images/slide1.png" class="slide">
</div>

<div class="welcome">
<h2>Hello</h2>
<p>Welcome to <b>BRIANNA</b></p>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="card">

<div class="top-actions">
<i class="fa fa-moon toggle"></i>
</div>

<form id="form">

<div class="input">
<input type="text" required>
<label>Username</label>
<i class="fa fa-user"></i>
</div>

<div class="input">
<input type="password" id="password" required>
<label>Password</label>
<i class="fa fa-eye toggle-pass"></i>
</div>

<div class="strength"><div class="bar"></div></div>

<div class="options">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot password?</a>
</div>

<button>Login</button>

<div class="account">
<p>Don't have an account yet?</p>
<a href="#">Create an account</a>
</div>

</form>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
